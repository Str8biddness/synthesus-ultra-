name: Synthesus 4.0 CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy pytest pytest-asyncio httpx fastapi uvicorn pydantic numpy faiss-cpu scikit-learn scipy beautifulsoup4 rich tenacity qiskit
    - name: Lint with ruff
      run: ruff check .
    - name: Type check with mypy
      run: |
        # Add packages to PYTHONPATH for mypy
        export PYTHONPATH=$PYTHONPATH:$(pwd)/packages/core:$(pwd)/packages/knowledge:$(pwd)/packages/reasoning:$(pwd)/packages/kernel:$(pwd)/packages/api
        mypy packages/core packages/api --ignore-missing-imports
    - name: Run Python tests
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)/packages/core:$(pwd)/packages/knowledge:$(pwd)/packages/reasoning:$(pwd)/packages/kernel:$(pwd)/packages/api
        pytest tests/ -v

  node-checks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: packages/organs/package-lock.json
    - name: Install dependencies
      run: cd packages/organs && npm install
    - name: Type check with tsc
      run: cd packages/organs && npm run build
    - name: Run Node tests
      run: cd packages/organs && npm test

  cpp-kernel-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install build essentials
      run: sudo apt-get update && sudo apt-get install -y build-essential cmake libkvm-dev
    - name: Build C++ Kernel
      run: |
        cd packages/kernel
        mkdir build && cd build
        cmake .. -DBUILD_PYBIND=OFF
        make -j2

  e2e-smoke-test:
    runs-on: ubuntu-latest
    needs: [python-checks, cpp-kernel-build]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        pip install fastapi uvicorn httpx pydantic numpy faiss-cpu
    - name: Run AIOS Server Smoke Test
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)/packages/core:$(pwd)/packages/api
        python3 packages/api/aios_server.py &
        sleep 5
        curl -f http://localhost:5010/api/health || exit 1
        kill $!
