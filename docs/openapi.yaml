openapi: 3.1.0
info:
  title: Synthesus 5 CHAL API
  description: Legacy-compatible Synthesus query and control API for the active Synthesus
    5 CHAL runtime. The public query path currently exposes explicit Cognitive Hypervisor
    routing through mode=chal, the business_bot CHAL preset, plus generation-spine,
    cognitive, RAG, kernel, and amplification telemetry. CognitiveHypervisorTrace
    documents debug.cognitive_hypervisor for CHAL requests, including reasoning-quality
    verifier telemetry, grounding-reranker telemetry, QuadBrainArbitration and
    QuadBrainReplayRecord when route=quad_brain_path, plus memory-writeback telemetry
    after API arbitration; CGPU traces are documented as CHAL contracts until candidate-set
    payloads are surfaced by this endpoint.
  version: 5.0.0
paths:
  /parameter-cloud/v2/fetch-batch:
    post:
      tags:
      - parameter-cloud-v2
      summary: Fetch Batch Params
      description: Fetch parameters matching namespace patterns across shards
      operationId: fetch_batch_params_parameter_cloud_v2_fetch_batch_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchParameterFetch'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Fetch Batch Params Parameter Cloud V2 Fetch Batch
                  Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /parameter-cloud/v2/query:
