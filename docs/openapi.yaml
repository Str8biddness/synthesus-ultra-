          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Update Batch Params Parameter Cloud V2 Update Batch
                  Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /parameter-cloud/v2/apply-gradients:
