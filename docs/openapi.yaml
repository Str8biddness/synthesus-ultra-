        in: query
        required: true
        schema:
          type: string
          description: Search query text
          title: Q
        description: Search query text
      - name: top_k
        in: query
        required: false
        schema:
          type: integer
          maximum: 50
          minimum: 1
          description: Number of results
          default: 5
          title: Top K
        description: Number of results
      - name: tags
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Comma-separated tag filter
          title: Tags
        description: Comma-separated tag filter
      - name: trust
        in: query
        required: false
        schema:
          type: number
          maximum: 100
          minimum: 0
          description: Player trust level
          default: 50.0
          title: Trust
        description: Player trust level
      - name: emotion
        in: query
        required: false
        schema:
          type: string
          description: Current NPC emotion
          default: neutral
          title: Emotion
        description: Current NPC emotion
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Search Knowledge Api V1 Knowledge Search Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
