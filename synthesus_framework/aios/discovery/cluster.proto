syntax = "proto3";

package synthesus;

service ClusterService {
  // Sync parameters (traits, facts) between nodes
  rpc SyncParameters (ParameterRequest) returns (SyncResponse);
  
  // Stream memory shards for large-scale retrieval
  rpc StreamMemory (MemoryRequest) returns (stream MemoryShard);
  
  // Send discovery heartbeat and node status
  rpc Heartbeat (NodeStatus) returns (Ack);
}

message ParameterRequest {
  string node_id = 1;
  map<string, string> parameters = 2;
}

message SyncResponse {
  bool success = 1;
  string message = 2;
}

message MemoryRequest {
  string shard_key = 1;
  int32 start_index = 2;
}

message MemoryShard {
  string shard_key = 1;
  bytes data = 2;
  bool is_last = 3;
}

message NodeStatus {
  string node_id = 1;
  string role = 2;
  float load_cpu = 3;
  int64 uptime_seconds = 4;
}

message Ack {
  bool ok = 1;
}
