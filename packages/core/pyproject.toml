[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "synthesus"
version = "4.0.0"
description = "AIVM Synthesus - Dual-Hemisphere Synthetic Intelligence Engine"
readme = "README.md"
license = { text = "MIT" }
authors = [
  { name = "Str8biddness", email = "dakinellegood@gmail.com" }
]
requires-python = ">=3.10"

dependencies = [
  # API
  "fastapi>=0.111.0",
  "uvicorn[standard]>=0.30.0",
  "pydantic>=2.7.0",
  "httpx>=0.27.0",

  # RAG / Embeddings (SwarmEmbedder: TF-IDF + SVD, no PyTorch needed)
  "faiss-cpu>=1.8.0",
  "numpy>=1.26.0",
  "scikit-learn>=1.4.0",
  "scipy>=1.12.0",

  # Utilities
  "beautifulsoup4>=4.12.0",
  "python-dotenv>=1.0.0",
  "rich>=13.7.0",
  "tenacity>=8.3.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.2.0",
  "pytest-asyncio>=0.23.0",
  "pytest-cov>=5.0.0",
  "black>=24.4.0",
  "ruff>=0.4.0",
  "mypy>=1.10.0",
  "pre-commit>=3.7.0",
]

[project.scripts]
synthesus = "core.synth_runtime:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["api*", "core*", "characters*", "kal*"]

[tool.black]
line-length = 100
target-version = ["py310", "py311", "py312"]

[tool.ruff]
line-length = 100
select = ["E", "F", "W", "I", "N", "UP"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "-v --tb=short"
